<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      padding: 20px;
      background-color: #f5f5f5;
    }
    .card {
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <h1 class="mb-4">Admin Dashboard</h1>

  <!-- Summary Cards -->
  <div class="row mb-4">
    <div class="col-md-4">
      <div class="card p-3">
        <h4>Total Sales: $<span id="totalSales">0</span></h4>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card p-3">
        <h4>Total Orders: <span id="totalOrders">0</span></h4>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card p-3">
        <h4>Total Products: <span id="totalProducts">0</span></h4>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <ul class="nav nav-tabs" id="adminTabs">
    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#orders">Orders</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#products">Products</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#customers">Customers</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#profile">Profile</a></li>
  </ul>

  <div class="tab-content mt-3">
    <!-- Orders Tab -->
    <div class="tab-pane fade show active" id="orders">
      <h3>Manage Orders</h3>
      <div id="orderList"></div>
    </div>

    <!-- Products Tab -->
    <div class="tab-pane fade" id="products">
      <h3>Manage Products</h3>
      <button class="btn btn-success mb-2" onclick="addDummyProduct()">+ Add Product</button>
      <div id="productList"></div>
    </div>

    <!-- Customers Tab -->
    <div class="tab-pane fade" id="customers">
      <h3>Customer Info</h3>
      <div id="customerList"></div>
    </div>

    <!-- Profile Tab -->
    <div class="tab-pane fade" id="profile">
      <h3>Admin Profile</h3>
      <p><strong>Name:</strong> <span id="adminName">Admin</span></p>
      <p><strong>Email:</strong> <span id="adminEmail">admin@example.com</span></p>
      <button class="btn btn-primary" onclick="changeProfile()">Change Profile</button>
    </div>
  </div>

  <script>
    const dummyOrders = [
      { id: 1, status: "Pending", total: 120 },
      { id: 2, status: "Delivered", total: 250 },
    ];

    const dummyProducts = [
      { id: 101, name: "Shoes", price: 60 },
      { id: 102, name: "Watch", price: 90 },
    ];

    const dummyCustomers = [
      { name: "Ali", city: "Lahore", email: "ali@example.com", phone: "03001234567" },
      { name: "Sara", city: "Karachi", email: "sara@example.com", phone: "03007654321" }
    ];

    function loadDashboard() {
      // Totals
      const totalSales = dummyOrders.reduce((sum, o) => sum + o.total, 0);
      document.getElementById("totalSales").textContent = totalSales;
      document.getElementById("totalOrders").textContent = dummyOrders.length;
      document.getElementById("totalProducts").textContent = dummyProducts.length;

      // Orders
      const orderList = document.getElementById("orderList");
      orderList.innerHTML = dummyOrders.map(order => `
        <div class="card p-2 mb-2">
          Order #${order.id} — <strong>${order.status}</strong> — $${order.total}
          <button class="btn btn-sm btn-outline-primary ms-3" onclick="updateStatus(${order.id})">Update Status</button>
        </div>
      `).join("");

      // Products
      const productList = document.getElementById("productList");
      productList.innerHTML = dummyProducts.map(product => `
        <div class="card p-2 mb-2">
          <strong>${product.name}</strong> - $${product.price}
          <button class="btn btn-sm btn-outline-danger ms-3" onclick="removeProduct(${product.id})">Remove</button>
        </div>
      `).join("");

      // Customers
      const customerList = document.getElementById("customerList");
      customerList.innerHTML = dummyCustomers.map(cust => `
        <div class="card p-2 mb-2">
          ${cust.name} (${cust.city}) — ${cust.email} — ${cust.phone}
        </div>
      `).join("");
    }

    function updateStatus(id) {
      const order = dummyOrders.find(o => o.id === id);
      if (order) {
        order.status = order.status === "Pending" ? "Delivered" : "Pending";
        loadDashboard();
      }
    }

    function addDummyProduct() {
      const id = Math.floor(Math.random() * 1000);
      dummyProducts.push({ id, name: "New Product", price: Math.floor(Math.random() * 100) });
      loadDashboard();
    }

    function removeProduct(id) {
      const index = dummyProducts.findIndex(p => p.id === id);
      if (index !== -1) dummyProducts.splice(index, 1);
      loadDashboard();
    }

    function changeProfile() {
      const name = prompt("Enter new name:", "Admin");
      const email = prompt("Enter new email:", "admin@example.com");
      if (name) document.getElementById("adminName").textContent = name;
      if (email) document.getElementById("adminEmail").textContent = email;
    }

    loadDashboard();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
